<svg viewBox="0 0 560 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1C1233" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#120B22" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="lineStroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#A855F7"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="areaFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34D399" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glowPurple" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#A855F7" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowOrange" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F97316" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="90" cy="80" r="130" fill="url(#glowPurple)"/>
  <circle cx="470" cy="330" r="140" fill="url(#glowOrange)"/>

  <!-- glass card -->
  <rect x="60" y="70" width="440" height="280" rx="28" fill="url(#cardFill)" stroke="#FFFFFF" stroke-opacity="0.08"/>

  <!-- price sparkline (trending down = a good deal) -->
  <path d="M 100 160 L 170 190 L 235 150 L 300 220 L 365 200 L 430 280"
        fill="none" stroke="url(#lineStroke)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 100 160 L 170 190 L 235 150 L 300 220 L 365 200 L 430 280 L 430 320 L 100 320 Z"
        fill="url(#areaFill)"/>
  <circle cx="430" cy="280" r="9" fill="#34D399"/>
  <circle cx="430" cy="280" r="16" fill="#34D399" fill-opacity="0.25"/>

  <!-- price tag -->
  <g transform="translate(120 108)">
    <path d="M0 20 L20 0 L64 0 A12 12 0 0 1 76 12 L76 44 A12 12 0 0 1 64 56 L20 56 A12 12 0 0 1 8 48 Z"
          transform="translate(0 -20) rotate(0)" fill="#1C1233" stroke="#A855F7" stroke-opacity="0.6" stroke-width="2"/>
    <circle cx="24" cy="-4" r="5" fill="#F97316"/>
  </g>

  <!-- discount badge -->
  <g transform="translate(340 96)">
    <rect x="0" y="0" width="72" height="30" rx="15" fill="#F97316"/>
    <text x="36" y="20" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="800" fill="#FFFFFF">-42%</text>
  </g>

  <!-- decorative dots -->
  <circle cx="90" cy="330" r="4" fill="#C084FC" fill-opacity="0.6"/>
  <circle cx="470" cy="90" r="4" fill="#34D399" fill-opacity="0.6"/>
  <circle cx="480" cy="150" r="3" fill="#FB923C" fill-opacity="0.6"/>
</svg>
