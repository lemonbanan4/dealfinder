name: dealfinder_pro
description: "DealFinder Pro — deal aggregator and price-alert app for Web (WASM) and Mobile."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3


  # Networking & scraping
  http: ^1.4.0
  html: ^0.15.6

  # Local persistence
  hive_flutter: ^1.1.0

  # Data classes
  freezed_annotation: ^3.0.0
  json_annotation: ^4.12.0

  # XML parsing (ECB rate feed)
  xml: ^6.5.0

  # UUID generation
  uuid: ^4.5.1
  google_fonts: ^6.2.1
  workmanager: ^0.5.2
  flutter_app_badger: ^1.5.0

  # Notifications
  firebase_messaging: ^16.2.2
  flutter_local_notifications: ^19.0.0
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  url_launcher: ^6.3.2
  cloud_functions: ^6.3.2
  firebase_app_check: ^0.4.4+2
  shared_preferences: ^2.5.5
  share_plus: ^13.1.0
  path_provider: ^2.1.5
  cached_network_image: ^3.4.1
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.4
  freezed: ^3.2.5
  json_serializable: ^6.14.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  shaders:
    - assets/shaders/liquid_glass.frag
