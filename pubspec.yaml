name: dealfinder_pro
description: "DealFinder Pro — deal aggregator and price-alert app for Web (WASM) and Mobile."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.5 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3


  # Networking
  http: ^1.6.0

  # Local persistence
  hive_flutter: ^1.1.0

  # Data classes
  freezed_annotation: ^3.0.0
  json_annotation: ^4.12.0

  google_fonts: ^6.2.1
  flutter_app_badger: ^1.5.0

  # UI effects
  shimmer: ^3.0.0

  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  google_sign_in: ^7.2.0
  cloud_firestore: ^6.4.1
  url_launcher: ^6.3.2
  cloud_functions: ^6.3.2
  firebase_app_check: ^0.4.4+2
  shared_preferences: ^2.5.5
  share_plus: ^13.1.0
  path_provider: ^2.1.5
  cached_network_image: ^3.4.1
  flutter_svg: ^2.3.0
  web: ^1.1.1
  supabase: ^2.13.0
  supabase_flutter: ^2.15.0
  crypto: ^3.0.3
  fl_chart: ^1.2.0
  intl: ^0.20.2
  firebase_analytics: ^12.4.3
  dio: ^5.10.0
  go_router: ^16.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fake_cloud_firestore: ^4.1.1
  mocktail: ^1.0.5
  riverpod_generator: ^4.0.4

  # Code generation
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
  shaders:
    - assets/shaders/liquid_glass.frag

