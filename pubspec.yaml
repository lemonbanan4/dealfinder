name: dealfinder_pro
description: "DealFinder Pro — deal aggregator and price-alert app for Web (WASM) and Mobile."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking & scraping
  http: ^1.4.0
  html: ^0.15.6

  # Local persistence
  hive_flutter: ^1.1.0

  # Data classes
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # XML parsing (ECB rate feed)
  xml: ^6.5.0

  # UUID generation
  uuid: ^4.5.1

  # Notifications
  flutter_local_notifications: ^19.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  freezed: ^3.0.0
  json_serializable: ^6.9.5
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true
