<!DOCTYPE html>
<html lang="en">

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!--
    Content-Security-Policy:
    - script-src: 'wasm-unsafe-eval' (Flutter's CanvasKit/Skwasm renderer compiles to WebAssembly,
      not JS eval). 'unsafe-inline' is also required — the Firebase JS SDK (firebase_core,
      firestore, functions, app_check, auth, messaging) injects inline <script> tags at runtime
      for its internal iframes/App Check/auth helpers. These are dynamically generated per
      session, so hash-listing isn't viable and this is a static site with no per-request nonce
      generation. Without 'unsafe-inline' here, Firebase init throws and the app hangs on the
      loading spinner forever.
      NOTE: 'strict-dynamic' is intentionally NOT used here — this is a static Firebase Hosting
      site with no per-request nonce generation, so 'strict-dynamic' would strip the host
      allowlist below and silently block every script (Apple Sign-In, Firebase, Corbado, Flutter
      bootstrap) in browsers that support it. Host-based allowlisting is the correct strict policy
      for a purely static deployment.
    - style-src: 'unsafe-inline' is required — Flutter's web engine (CanvasKit) injects inline
      <style> tags and style attributes at runtime for text measurement, semantics, and canvas
      positioning. There is no nonce/hash mechanism for this dynamic engine-generated CSS, so
      removing 'unsafe-inline' here breaks rendering (app hangs on the loading spinner forever).
    - connect-src: all required external endpoints for Supabase, Firebase, fonts, and APIs.
      cdn.simpleicons.org is here because flutter_svg's network loader fetches SVG brand
      logos via a real HTTP client call (unlike raster network images, which the engine
      loads through an <img>-element path covered by img-src instead).
    - Google Sign-In (script-src apis.google.com, frame-src *.firebaseapp.com): Firebase's
      popup-based signInWithPopup loads Google's gapi client (apis.google.com/js/api.js) and
      uses a same-project firebaseapp.com auth-helper iframe for the popup<->app postMessage
      relay. Without both of these, signInWithPopup fails silently and every Google sign-in
      falls back to a full-page signInWithRedirect (worse UX, and was going unnoticed since the
      redirect fallback happened to still work).
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self' https://*.firebaseapp.com https://*.web.app;
    script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://appleid.cdn-apple.com https://www.gstatic.com https://*.firebaseio.com https://apis.google.com;
    connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.googleapis.com https://*.firebaseio.com https://identitytoolkit.googleapis.com https://www.gstatic.com https://fonts.gstatic.com https://dealfinder-swr5.onrender.com https://www.ecb.europa.eu https://cdn.simpleicons.org https://apis.google.com;
    frame-src 'self' https://appleid.apple.com https://*.firebaseapp.com https://accounts.google.com;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    img-src 'self' data: https:;
    font-src 'self' data: https://fonts.gstatic.com https:;
    base-uri 'self';
    object-src 'none';">

  <!-- SEO -->
  <title>Sign up for Superdeals | PrisPuls</title>
  <meta name="description"
    content="Sign up for PrisPuls to get the best superdeals on products you love, delivered right to your inbox. Never miss a great price again!">
  <link rel="canonical" href="https://www.prispuls.com" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.prispuls.com">
  <meta property="og:title" content="Sign up for Superdeals | PrisPuls">
  <meta property="og:description"
    content="Sign up for PrisPuls to get the best superdeals on products you love, delivered right to your inbox.">
  <meta property="og:image" content="https://www.prispuls.com/icons/Icon-512.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://www.prispuls.com">
  <meta property="twitter:title" content="Sign up for Superdeals | PrisPuls">
  <meta property="twitter:description"
    content="Sign up for PrisPuls to get the best superdeals on products you love, delivered right to your inbox.">
  <meta property="twitter:image" content="https://www.prispuls.com/icons/Icon-512.png">


  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="PrisPuls">
  <link rel="apple-touch-icon" href="icons/Icon-192.png" alt="PrisPuls App Icon">
  <meta name="theme-color" content="#0175C2">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" alt="PrisPuls Favicon">

  <link rel="manifest" href="manifest.json">

  <!-- Loading spinner styles (external – CSP compliant) -->
  <link rel="stylesheet" href="flutter_loader.css">

  <script type="text/javascript"
    src="https://appleid.cdn-apple.com/appleauth/static/jsapi/appleid/1/en_US/appleid.auth.js"></script>
  <script type="text/javascript" src="corbado_bundle.js"></script>

</head>

<body>
  <div class="loading">
    <div class="loader"></div>
  </div>

  <!-- Structured Data -->
  <script type="application/ld+json" src="structured_data.json"></script>

  <!-- When a new service worker activates (skipWaiting fires), reload once so
       users immediately get the latest build instead of staying on old cached content. -->
  <script src="sw_helper.js" defer></script>

  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
