<!DOCTYPE html>
<html lang="en">

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 
    Content-Security-Policy:
    This is the fix for the white screen issue. Flutter's web engine uses
    'unsafe-eval' to compile shaders and optimize performance. We also need
    to allow connections to Supabase and scripts from Apple for Sign In.
  -->

  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' https://*.firebaseapp.com https://*.web.app; script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval' https://appleid.cdn-apple.com https://www.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.googleapis.com https://*.firebaseio.com https://www.gstatic.com https://fonts.gstatic.com https://dealfinder-swr5.onrender.com https://www.ecb.europa.eu https://v6.exchangerate-api.com; frame-src 'self' https://appleid.apple.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com https:;">

  <!-- SEO -->
  <title>Sign up for Superdeals | PrisPuls</title>
  <meta name="description"
    content="Sign up for PrisPuls to get the best superdeals on products you love, delivered right to your inbox. Never miss a great price again!">
  <link rel="canonical" href="https://www.prispuls.com" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.prispuls.com">
  <meta property="og:title" content="Sign up for Superdeals | PrisPuls">
  <meta property="og:description"
    content="Sign up for PrisPuls to get the best superdeals on products you love, delivered right to your inbox.">
  <meta property="og:image" content="https://www.prispuls.com/icons/Icon-512.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://www.prispuls.com">
  <meta property="twitter:title" content="Sign up for Superdeals | PrisPuls">
  <meta property="twitter:description"
    content="Sign up for PrisPuls to get the best superdeals on products you love, delivered right to your inbox.">
  <meta property="twitter:image" content="https://www.prispuls.com/icons/Icon-512.png">


  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="PrisPuls">
  <link rel="apple-touch-icon" href="icons/Icon-192.png" alt="PrisPuls App Icon">
  <meta name="theme-color" content="#0175C2">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" alt="PrisPuls Favicon">

  <link rel="manifest" href="manifest.json">

  <script type="text/javascript"
    src="https://appleid.cdn-apple.com/appleauth/static/jsapi/appleid/1/en_US/appleid.auth.js"></script>

  <style>
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .loader {
      border: 8px solid #f3f3f3;
      /* Light grey */
      border-top: 8px solid #0175C2;
      /* Blue from manifest */
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="loading">
    <div class="loader"></div>
  </div>

  <!-- Structured Data -->
  <script type="application/ld+json" src="structured_data.json"></script>

  <!-- When a new service worker activates (skipWaiting fires), reload once so
       users immediately get the latest build instead of staying on old cached content. -->
  <script src="sw_helper.js" defer></script>

  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
