name: Deal Scraper Automation

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # This allows you to click a button to run it manually

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Matches a stable Python version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: Run Scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          # This runner has no GCP identity, so scraper.py's Secret Manager
          # fallback (access_secret_version) always fails here with "Your
          # default credentials were not found" — every run was silently
          # skipping price-drop alert emails. GMAIL_APP_PASSWORD must be
          # added as a repo secret (Settings -> Secrets and variables ->
          # Actions -> New repository secret) with the same Gmail App
          # Password value already stored in GCP Secret Manager under
          # project dealfinderpro-bc5be, secret "Scraper".
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        # If your scraper is in a folder called 'scraper', adjust the path below:
        run: python scraper/scraper.py
