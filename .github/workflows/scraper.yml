name: Deal Scraper Automation

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # This allows you to click a button to run it manually

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Matches a stable Python version

      - name: Install dependencies
        # Make sure your requirements.txt is up to date!
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 

      - name: Run Scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        # If your scraper is in a folder called 'scraper', adjust the path below:
        run: python scraper/scraper.py
