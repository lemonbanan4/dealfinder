name: Keep API Warm

# Render's free tier spins the API down after ~15 minutes with no HTTP
# traffic; the next request then eats a cold-start delay (confirmed live —
# this is exactly what caused sitemap_xml to time out/502 against
# /api/products). A visitor's first page load pays that same cold-start
# tax whenever the service has been idle. Pinging the DB-aware health
# check every 10 minutes (comfortably under the 15-minute window) keeps
# it warm continuously instead.

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health check
        run: |
          curl -sf -m 25 "https://dealfinder-swr5.onrender.com/api/health" \
            || echo "Health check failed or API was cold — this run's ping still served to warm it up for the next request."
