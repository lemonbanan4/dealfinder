name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib/ test/

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          pip install -r requirements.txt
          pip install -r scraper/requirements.txt

      - name: Lint with ruff
        run: ruff check api.py scraper/

      - name: Compile-check (syntax) all Python sources
        run: python -m py_compile api.py scraper/scraper.py
